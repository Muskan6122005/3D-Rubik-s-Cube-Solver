<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rubik's Cube Solver</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <!-- Link to our Custom Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    
    <!-- External Solver removed - we'll compute solver path manually via inverted history -->
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Rubik's Cube Solver</h1>
        </header>

        <main>
            <!-- 3D Cube Scene -->
            <div class="scene-container">
                <div class="scene">
                    <div class="cube" id="cube">
                        <!-- Cubies will be injected here by JS -->
                    </div>
                </div>
                <div class="orbit-hint">Drag to rotate camera</div>
            </div>

            <!-- Controls Panel -->
            <div class="controls-panel">
                <div class="cube-controls">
                    <h3>Manual Moves</h3>
                    <div class="move-buttons">
                        <button class="move-btn" data-move="U">U</button>
                        <button class="move-btn" data-move="U'">U'</button>
                        <button class="move-btn" data-move="D">D</button>
                        <button class="move-btn" data-move="D'">D'</button>
                        <button class="move-btn" data-move="R">R</button>
                        <button class="move-btn" data-move="R'">R'</button>
                        <button class="move-btn" data-move="L">L</button>
                        <button class="move-btn" data-move="L'">L'</button>
                        <button class="move-btn" data-move="F">F</button>
                        <button class="move-btn" data-move="F'">F'</button>
                        <button class="move-btn" data-move="B">B</button>
                        <button class="move-btn" data-move="B'">B'</button>
                    </div>
                </div>
                
                <div class="action-controls">
                    <h3>Actions</h3>
                    <button id="shuffleBtn" class="action-btn">
                        <span class="material-symbols-outlined">shuffle</span> Shuffle
                    </button>
                    <button id="solveBtn" class="action-btn primary">
                        <span class="material-symbols-outlined">psychology</span> Solve
                    </button>
                    <button id="resetBtn" class="action-btn danger">
                        <span class="material-symbols-outlined">restart_alt</span> Reset
                    </button>
                </div>
            </div>

            <!-- Timeline -->
            <div class="timeline-container" id="timelineContainer">
                <h3>Solve Timeline</h3>
                <div class="playback-controls">
                    <button id="playTimelineBtn" disabled><span class="material-symbols-outlined">play_arrow</span> Play</button>
                    <output id="moveCount">0 moves</output>
                </div>
                <div class="timeline" id="timeline">
                    <!-- Move cards will go here -->
                    <div class="placeholder-text">Timeline is empty.</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Our Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
